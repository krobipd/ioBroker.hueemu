<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hue Emulator</title>

    <!-- Load ioBroker scripts and styles -->
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
    <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

    <script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="../../socket.io/socket.io.js"></script>

    <script type="text/javascript" src="../../js/translate.js"></script>
    <script type="text/javascript" src="../../lib/js/materialize.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>

    <!-- Load our own files -->
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script type="text/javascript" src="words.js"></script>

    <style>
        .adapter-container {
            padding: 10px 20px;
        }
        .tabs .tab a {
            color: #1976d2;
        }
        .tabs .tab a.active {
            color: #1976d2;
        }
        .tabs .indicator {
            background-color: #1976d2;
        }
        .card-panel {
            padding: 15px;
            margin-top: 10px;
        }
        .device-table {
            margin-top: 20px;
        }
        .device-table th {
            padding: 10px;
            background-color: #f5f5f5;
        }
        .device-table td {
            padding: 8px;
            vertical-align: middle;
        }
        .btn-floating.btn-small {
            width: 30px;
            height: 30px;
            line-height: 30px;
        }
        .btn-floating.btn-small i {
            line-height: 30px;
            font-size: 1.2rem;
        }
        .object-id-input {
            font-family: monospace;
            font-size: 12px;
        }
        .device-row td {
            border-bottom: 1px solid #e0e0e0;
        }
        .section-title {
            font-size: 1.2rem;
            color: #1976d2;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #1976d2;
        }
        .help-text {
            font-size: 0.9rem;
            color: #757575;
            margin-bottom: 15px;
        }
        .light-type-select {
            margin-bottom: 0;
        }
        .action-buttons {
            white-space: nowrap;
        }
        .mapping-section {
            background-color: #fafafa;
            padding: 10px;
            border-radius: 4px;
            margin-top: 5px;
        }
        .mapping-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .mapping-row label {
            width: 80px;
            font-weight: 500;
        }
        .mapping-row input {
            flex: 1;
            margin: 0 !important;
        }
        .mapping-row button {
            margin-left: 5px;
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .collapsible-header .badge {
            margin-left: 10px;
        }
        .no-devices {
            text-align: center;
            padding: 40px;
            color: #9e9e9e;
        }
        .no-devices i {
            font-size: 48px;
            margin-bottom: 10px;
        }
        #add-device-btn {
            position: fixed;
            bottom: 80px;
            right: 30px;
            z-index: 100;
        }
    </style>

    <script type="text/javascript">
        let namespace = 'hueemu.' + instance;
        let devices = [];

        // Light type definitions
        const lightTypes = {
            'onoff': {
                name: 'On/Off Light',
                type: 'On/Off light',
                states: ['on'],
                modelid: 'LOM001'
            },
            'dimmable': {
                name: 'Dimmable Light',
                type: 'Dimmable light',
                states: ['on', 'bri'],
                modelid: 'LWB010'
            },
            'ct': {
                name: 'Color Temperature Light',
                type: 'Color temperature light',
                states: ['on', 'bri', 'ct'],
                modelid: 'LTW001'
            },
            'color': {
                name: 'Extended Color Light',
                type: 'Extended color light',
                states: ['on', 'bri', 'hue', 'sat', 'ct', 'xy'],
                modelid: 'LCT003'
            }
        };

        // State descriptions for tooltips
        const stateDescriptions = {
            'on': { label: 'On/Off', type: 'boolean', desc: 'On/Off state (true/false)' },
            'bri': { label: 'Brightness', type: 'number', desc: 'Brightness (0-254)' },
            'hue': { label: 'Hue', type: 'number', desc: 'Hue (0-65535)' },
            'sat': { label: 'Saturation', type: 'number', desc: 'Saturation (0-254)' },
            'ct': { label: 'Color Temp', type: 'number', desc: 'Color temperature (153-500 mireds)' },
            'xy': { label: 'XY Color', type: 'string', desc: 'CIE xy coordinates (e.g., "0.5,0.4")' }
        };

        // This will be called by the admin adapter when the settings page loads
        function load(settings, onChange) {
            if (!settings) return;

            // Load simple values
            $('.value').each(function() {
                var $key = $(this);
                var id = $key.attr('id');
                if ($key.attr('type') === 'checkbox') {
                    $key.prop('checked', settings[id]).on('change', () => onChange());
                } else {
                    $key.val(settings[id]).on('change', () => onChange()).on('keyup', () => onChange());
                }
            });

            // Load devices
            devices = settings.devices || [];
            renderDevices();

            // Initialize Materialize components
            M.Tabs.init(document.querySelectorAll('.tabs'));
            M.Collapsible.init(document.querySelectorAll('.collapsible'));
            M.FormSelect.init(document.querySelectorAll('select'));

            onChange(false);
            if (M) M.updateTextFields();
        }

        // This will be called by the admin adapter when the user presses the save button
        function save(callback) {
            var obj = {};

            // Save simple values
            $('.value').each(function() {
                var $this = $(this);
                if ($this.attr('type') === 'checkbox') {
                    obj[$this.attr('id')] = $this.prop('checked');
                } else {
                    obj[$this.attr('id')] = $this.val();
                }
            });

            // Save devices
            obj.devices = devices;

            callback(obj);
        }

        // Render devices list
        function renderDevices() {
            const container = $('#devices-list');
            container.empty();

            if (devices.length === 0) {
                container.html(`
                    <div class="no-devices">
                        <i class="material-icons">lightbulb_outline</i>
                        <p class="translate">noDevicesConfigured</p>
                        <p class="help-text translate">clickToAddDevice</p>
                    </div>
                `);
                translateAll();
                return;
            }

            const collapsible = $('<ul class="collapsible"></ul>');

            devices.forEach((device, index) => {
                const lightType = lightTypes[device.lightType] || lightTypes['color'];
                const mappedCount = Object.keys(device.mapping || {}).filter(k => device.mapping[k]).length;
                const totalStates = lightType.states.length;

                const item = $(`
                    <li>
                        <div class="collapsible-header">
                            <span>
                                <i class="material-icons">lightbulb_outline</i>
                                <strong>${escapeHtml(device.name || 'Unnamed Light')}</strong>
                                <span class="grey-text"> - ${lightType.name}</span>
                            </span>
                            <span>
                                <span class="badge">${mappedCount}/${totalStates} <span class="translate">mapped</span></span>
                            </span>
                        </div>
                        <div class="collapsible-body">
                            <div class="row">
                                <div class="input-field col s6">
                                    <input type="text" id="device-name-${index}" value="${escapeHtml(device.name || '')}"
                                           onchange="updateDeviceName(${index}, this.value)">
                                    <label for="device-name-${index}" class="active translate">deviceName</label>
                                </div>
                                <div class="input-field col s4">
                                    <select id="device-type-${index}" onchange="updateDeviceType(${index}, this.value)">
                                        ${Object.entries(lightTypes).map(([key, lt]) =>
                                            `<option value="${key}" ${device.lightType === key ? 'selected' : ''}>${lt.name}</option>`
                                        ).join('')}
                                    </select>
                                    <label class="translate">lightType</label>
                                </div>
                                <div class="col s2 right-align" style="padding-top: 20px;">
                                    <a class="btn-floating btn-small red waves-effect waves-light"
                                       onclick="deleteDevice(${index})" title="Delete">
                                        <i class="material-icons">delete</i>
                                    </a>
                                </div>
                            </div>
                            <div class="section-title translate">stateMapping</div>
                            <p class="help-text translate">stateMappingHelp</p>
                            <div class="mapping-section" id="mapping-${index}">
                                ${renderMappings(device, index)}
                            </div>
                        </div>
                    </li>
                `);

                collapsible.append(item);
            });

            container.append(collapsible);

            // Reinitialize components
            M.Collapsible.init(document.querySelectorAll('.collapsible'));
            M.FormSelect.init(document.querySelectorAll('select'));
            M.updateTextFields();
            translateAll();
        }

        // Render state mappings for a device
        function renderMappings(device, deviceIndex) {
            const lightType = lightTypes[device.lightType] || lightTypes['color'];
            const mapping = device.mapping || {};

            return lightType.states.map(state => {
                const stateInfo = stateDescriptions[state];
                const value = mapping[state] || '';
                return `
                    <div class="mapping-row">
                        <label title="${stateInfo.desc}">${stateInfo.label}:</label>
                        <input type="text"
                               class="object-id-input"
                               id="mapping-${deviceIndex}-${state}"
                               value="${escapeHtml(value)}"
                               placeholder="Select state..."
                               onchange="updateMapping(${deviceIndex}, '${state}', this.value)">
                        <button class="btn-small waves-effect waves-light"
                                onclick="selectObject(${deviceIndex}, '${state}')"
                                title="Select object">
                            <i class="material-icons">search</i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Add new device
        function addDevice() {
            devices.push({
                name: 'New Light ' + (devices.length + 1),
                lightType: 'color',
                mapping: {}
            });
            renderDevices();

            // Open the new device
            setTimeout(() => {
                const collapsible = M.Collapsible.getInstance(document.querySelector('.collapsible'));
                if (collapsible) {
                    collapsible.open(devices.length - 1);
                }
            }, 100);

            onChange();
        }

        // Delete device
        function deleteDevice(index) {
            if (confirm(_('confirmDeleteDevice'))) {
                devices.splice(index, 1);
                renderDevices();
                onChange();
            }
        }

        // Update device name
        function updateDeviceName(index, name) {
            devices[index].name = name;
            onChange();
        }

        // Update device type
        function updateDeviceType(index, type) {
            devices[index].lightType = type;
            // Clear mappings that don't apply to new type
            const validStates = lightTypes[type].states;
            const newMapping = {};
            validStates.forEach(state => {
                if (devices[index].mapping && devices[index].mapping[state]) {
                    newMapping[state] = devices[index].mapping[state];
                }
            });
            devices[index].mapping = newMapping;
            renderDevices();

            // Reopen the device panel
            setTimeout(() => {
                const collapsible = M.Collapsible.getInstance(document.querySelector('.collapsible'));
                if (collapsible) {
                    collapsible.open(index);
                }
            }, 100);

            onChange();
        }

        // Update state mapping
        function updateMapping(deviceIndex, state, value) {
            if (!devices[deviceIndex].mapping) {
                devices[deviceIndex].mapping = {};
            }
            devices[deviceIndex].mapping[state] = value;
            onChange();
        }

        // Select object using ioBroker object browser
        function selectObject(deviceIndex, state) {
            const stateInfo = stateDescriptions[state];

            // Use ioBroker's selectId dialog
            if (typeof selectId === 'function') {
                const currentValue = devices[deviceIndex].mapping ? devices[deviceIndex].mapping[state] : '';

                selectId(socket, currentValue, {
                    name: 'Select state for ' + stateInfo.label,
                    type: 'state',
                    noMultiselect: true,
                    customFilter: null
                }, function(newValue) {
                    if (newValue !== null && newValue !== undefined) {
                        $(`#mapping-${deviceIndex}-${state}`).val(newValue);
                        updateMapping(deviceIndex, state, newValue);
                    }
                });
            } else {
                alert('Object browser not available');
            }
        }

        // Helper: Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Helper: Translate all elements
        function translateAll() {
            $('.translate').each(function() {
                const $this = $(this);
                const text = $this.text() || $this.attr('placeholder');
                if (text && systemDictionary[text]) {
                    const translated = _(text);
                    if ($this.is('label') || $this.is('span') || $this.is('p') || $this.is('div')) {
                        $this.text(translated);
                    } else if ($this.is('input')) {
                        $this.attr('placeholder', translated);
                    }
                }
            });
        }

        // Mark changes
        function onChange() {
            if (typeof changed === 'function') {
                changed(true);
            }
        }
    </script>
</head>

<body>
    <div class="m adapter-container">
        <!-- Header with logo -->
        <div class="row" style="margin-bottom: 0;">
            <div class="col s12">
                <div style="display: flex; align-items: center; margin-bottom: 10px;">
                    <img src="hue-emu-logo.png" style="height: 40px; margin-right: 15px;">
                    <h5 style="margin: 0;">Hue Emulator</h5>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="row">
            <div class="col s12">
                <ul class="tabs">
                    <li class="tab col s6"><a class="active" href="#tab-network"><i class="material-icons left">settings_ethernet</i><span class="translate">networkSettings</span></a></li>
                    <li class="tab col s6"><a href="#tab-devices"><i class="material-icons left">devices</i><span class="translate">deviceConfiguration</span></a></li>
                </ul>
            </div>
        </div>

        <!-- Tab: Network Settings -->
        <div id="tab-network" class="col s12">
            <div class="card-panel">
                <div class="section-title translate">serverSettings</div>
                <div class="row">
                    <div class="input-field col s6 m4">
                        <input type="text" class="value" id="host"/>
                        <label for="host" class="translate">host</label>
                    </div>
                    <div class="input-field col s6 m4">
                        <input type="number" class="value" id="port"/>
                        <label for="port" class="translate">port</label>
                    </div>
                    <div class="input-field col s6 m4">
                        <input type="number" class="value" id="httpsPort"/>
                        <label for="httpsPort" class="translate">httpsPort</label>
                    </div>
                </div>

                <div class="section-title translate">discoverySettings</div>
                <div class="row">
                    <div class="input-field col s6 m4">
                        <input type="text" class="value" id="discoveryHost"/>
                        <label for="discoveryHost" class="translate">discoveryHost</label>
                    </div>
                    <div class="input-field col s6 m4">
                        <input type="number" class="value" id="discoveryPort"/>
                        <label for="discoveryPort" class="translate">discoveryPort</label>
                    </div>
                    <div class="input-field col s6 m4">
                        <input type="number" class="value" id="upnpPort"/>
                        <label for="upnpPort" class="translate">upnpPort</label>
                    </div>
                </div>

                <div class="section-title translate">bridgeIdentity</div>
                <div class="row">
                    <div class="input-field col s6">
                        <input type="text" class="value" id="mac" placeholder="AA:BB:CC:DD:EE:FF"/>
                        <label for="mac" class="translate">mac</label>
                    </div>
                    <div class="input-field col s6">
                        <input type="text" class="value" id="udn" placeholder="Auto-generated if empty"/>
                        <label for="udn" class="translate">udn</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Device Configuration -->
        <div id="tab-devices" class="col s12">
            <div class="card-panel">
                <div class="section-title translate">configuredDevices</div>
                <p class="help-text translate">deviceConfigHelp</p>

                <div id="devices-list">
                    <!-- Devices will be rendered here -->
                </div>
            </div>
        </div>

        <!-- Floating Action Button -->
        <div class="fixed-action-btn" id="add-device-btn">
            <a class="btn-floating btn-large waves-effect waves-light blue" onclick="addDevice()" title="Add device">
                <i class="material-icons">add</i>
            </a>
        </div>
    </div>
</body>
</html>
